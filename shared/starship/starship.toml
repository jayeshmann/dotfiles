add_newline = true
# command_timeout caps how long any single starship sub-command (typically
# `git status` / `git rev-parse`) is allowed to run before being dropped.
# 500ms is starship's default but causes git timeouts on macOS in repos
# under Spotlight / iCloud-backed dirs / large worktrees. 1500ms gives
# git enough headroom without making the prompt feel laggy.
command_timeout = 1500

format = """
$directory\
$git_branch$git_status\
$nodejs$python$rust$golang\
$cmd_duration\
$line_break$character"""

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
style = "bold yellow"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "yellow"

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"

[nodejs]
format = "via [⬢ $version](bold green) "

[python]
format = "via [🐍 $version](bold yellow) "
