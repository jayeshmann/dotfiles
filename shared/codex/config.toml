model = "gpt-5.5"
model_reasoning_effort = "medium"
personality = "pragmatic"

# Per-machine trust paths ([projects."..."] blocks) are added at runtime by
# `codex` itself when you trust a project, and stripped from the live→repo
# sync via codex_filter in ./dot. Re-trust per machine after `./dot bootstrap`.
[tui]
status_line = [
  "current-dir",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
  "git-branch",
  "codex-version",
  "model-with-reasoning",
  "session-id",
]

[tui.model_availability_nux]
"gpt-5.5" = 4

