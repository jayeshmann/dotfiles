name: test

on:
  push:
    branches: [main]

jobs:
  ctx-pct-colored:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run ctx-pct-colored.sh tests
        run: bash tests/ctx-pct-colored.test.sh
